<!-- ====== CAPTURE D'ERREUR GLOBALE — doit être le tout premier script ======
     Si quoi que ce soit casse plus loin (CDN bloqué, erreur JS, Supabase
     inaccessible...), ceci affiche le détail à l'écran au lieu de laisser
     l'app figée sur le loader. -->
<script>
  window.__ceErrors = [];
  window.ceShowFatalError = function ceShowFatalError(title, detail) {
    var loader = document.getElementById("boot-loader");
    if (loader) loader.style.display = "none";
    var existing = document.getElementById("ce-fatal-error");
    if (existing) { 
      var list = existing.querySelector("#ce-fatal-list");
      var li = document.createElement("div");
      li.style.marginTop = "10px";
      li.textContent = detail;
      list.appendChild(li);
      return;
    }
    var box = document.createElement("div");
    box.id = "ce-fatal-error";
    box.innerHTML =
      '<div style="max-width:480px;margin:60px auto;padding:22px;background:#2a1f1a;border:1.5px solid #B5542B;border-radius:14px;color:#F2EDE4;font-family:-apple-system,sans-serif;">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
          '<div style="width:34px;height:34px;border-radius:9px;background:#B5542B;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:Georgia,serif;flex-shrink:0;">!</div>' +
          '<div style="font-weight:700;font-size:16px;">Erreur de chargement</div>' +
        '</div>' +
        '<div style="font-size:13px;opacity:0.85;line-height:1.5;margin-bottom:14px;">' + title + '</div>' +
        '<div id="ce-fatal-list" style="font-size:11.5px;font-family:monospace;background:#1A1814;padding:10px 12px;border-radius:8px;word-break:break-word;line-height:1.6;max-height:260px;overflow:auto;"><div>' + detail + '</div></div>' +
        '<div style="font-size:11.5px;opacity:0.6;margin-top:14px;line-height:1.5;">Astuce : ouvre ce fichier via une vraie adresse https:// (déployé sur Netlify, Vercel...) plutôt qu\'en double-cliquant sur le fichier téléchargé — certains navigateurs bloquent des fonctionnalités essentielles (réseau, caméra) sur les fichiers locaux.</div>' +
      '</div>';
    box.style.position = "fixed";
    box.style.inset = "0";
    box.style.background = "#1A1814";
    box.style.overflow = "auto";
    box.style.zIndex = "99999";
    if (document.body) {
      document.body.appendChild(box);
    } else {
      document.addEventListener("DOMContentLoaded", function () {
        document.body.appendChild(box);
      });
    }
  }
  window.addEventListener("error", function (e) {
    ceShowFatalError(
      "Une erreur JavaScript a empêché l'application de démarrer.",
      (e.message || "Erreur inconnue") + (e.filename ? "\n@ " + e.filename + ":" + e.lineno : "")
    );
  });
  window.addEventListener("unhandledrejection", function (e) {
    ceShowFatalError(
      "Une promesse a échoué sans être gérée (souvent un problème réseau).",
      String(e.reason && e.reason.message ? e.reason.message : e.reason)
    );
  });
  // Sécurité : si après 6s le loader est encore visible, c'est que React n'a
  // jamais pris le relais (script CDN bloqué, erreur silencieuse...).
  setTimeout(function () {
    var loader = document.getElementById("boot-loader");
    if (loader && loader.style.display !== "none" && document.getElementById("root").children.length === 0) {
      ceShowFatalError(
        "L'application met anormalement longtemps à démarrer.",
        "Causes possibles : connexion internet absente, CDN bloqué (React/Babel/Supabase n'ont pas pu se charger), ou fichier ouvert en file:// au lieu d'une vraie URL https://."
      );
    }
  }, 6000);
</script>

function Icon({ name, size = 18, color = "currentColor", fill = "none", style }) {
  const paths = ICON_PATHS[name];
  if (!paths) return null;
  const fillColor = fill && fill !== "none" ? fill : "none";
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke={color}
      strokeWidth={2}
      strokeLinecap="round"
      strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}
    >
      {paths.map((p, i) => {
        if (p.startsWith("circle:")) {
          const parts = p.replace("circle:", "").split(",");
          return <circle key={i} cx={parts[0]} cy={parts[1]} r={parts[2]} fill={fillColor} stroke={color} />;
        }
        if (p.startsWith("rect:")) {
          const parts = p.replace("rect:", "").split(",");
          return <rect key={i} x={parts[0]} y={parts[1]} width={parts[2]} height={parts[3]} rx={parts[4] || 0} fill={fillColor} stroke={color} />;
        }
        return <path key={i} d={p} fill={fillColor} stroke={color} />;
      })}
    </svg>
  );
}

async function dbGet(key, fallback) {
  try {
    const { data, error } = await sb.from("app_state").select("value").eq("key", key).maybeSingle();
    if (error || !data) return fallback;
    return data.value;
  } catch (e) {
    console.error("dbGet failed", key, e);
    return fallback;
  }
}
async function dbSet(key, value) {
  try {
    const { error } = await sb.from("app_state").upsert({ key, value, updated_at: new Date().toISOString() });
    if (error) console.error("dbSet error", key, error);
  } catch (e) {
    console.error("dbSet failed", key, e);
  }
}

function loadLocalDevice(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveLocalDevice(key, value) {
  try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}

  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "à l'instant";
  if (s < 3600) return `il y a ${Math.floor(s / 60)} min`;
  if (s < 86400) return `il y a ${Math.floor(s / 3600)} h`;

  const [chats, setChats] = useState({});
  const [sessionUserId, setSessionUserId] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [view, setView] = useState("auth"); // auth | home | admin
  const [role, setRole] = useState("demandeur");
  const [toast, setToast] = useState(null);

  const usersRef = useRef(users);
  usersRef.current = users;
  const commissionsRef = useRef(commissions);
  commissionsRef.current = commissions;
  const chatsRef = useRef(chats);
  chatsRef.current = chats;

  // Chargement initial + polling pour synchroniser entre appareils
  useEffect(() => {
    let cancelled = false;
    let pollTimer = null;

    async function fetchAll() {
      const [u, c, ch] = await Promise.all([
        dbGet(DB_KEYS.users, {}),
        dbGet(DB_KEYS.commissions, []),
        dbGet(DB_KEYS.chats, {}),
      ]);
      if (cancelled) return;
      setUsers(u || {});
      setCommissions(c || []);
      setChats(ch || {});
      return { u, c, ch };
    }

    (async () => {
      try {
        const result = await fetchAll();
        const adminFlag = loadLocalDevice("ce_is_admin", false);
        const s = loadLocalDevice("ce_session", null);
        if (adminFlag) {
          setIsAdmin(true);
          setView("admin");
        } else if (s && result?.u && result.u[s]) {
          setSessionUserId(s);
          setView("home");
        }
      } catch (e) {
        setConnError(true);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();

    // Polling léger toutes les 4s pour voir les actions des autres testeurs
    pollTimer = setInterval(() => { fetchAll().catch(() => {}); }, 4000);

    return () => { cancelled = true; if (pollTimer) clearInterval(pollTimer); };
  }, []);

  const showToast = useCallback((msg, kind = "info") => {
    setToast({ msg, kind, id: Date.now() });
    setTimeout(() => setToast((t) => (t && t.id === Date.now() ? null : t)), 3200);
  }, []);

  const persistUsers = useCallback(async (next) => {
    setUsers(next);
    await dbSet(DB_KEYS.users, next);
  }, []);
  const persistCommissions = useCallback(async (next) => {
    setCommissions(next);
    await dbSet(DB_KEYS.commissions, next);
  }, []);
  const persistChats = useCallback(async (next) => {
    setChats(next);
    await dbSet(DB_KEYS.chats, next);
  }, []);

  async function updateUser(userId, patch) {
    const current = usersRef.current;
    const next = { ...current, [userId]: { ...current[userId], ...patch } };
    await persistUsers(next);
  }

  async function handleLogin(phone, name) {
    const existing = Object.values(usersRef.current).find((u) => u.phone === phone);
    if (existing) {
      setSessionUserId(existing.id);
      saveLocalDevice("ce_session", existing.id);
      setView("home");
      showToast(`Content de te revoir, ${existing.name.split(" ")[0]} !`);
      return;
    }
    const newUser = {
      id: uid("user"),
      name,
      phone,
      walletDemandeur: WALLET_DEMANDEUR_INITIAL,
      walletExecutant: WALLET_EXECUTANT_INITIAL,
      kyc: { status: "none", docs: {} },
      ratingDemandeur: { avg: 5, count: 0 },
      scoreExecutant: {
        noteGlobale: 5,
        nbCommissions: 0,
        tauxCompletion: 100,
        details: { qualite: 5, ponctualite: 5, communication: 5, attitude: 5, presentation: 5 },
        notesRecues: [],
      },
      favoris: [],
      createdAt: Date.now(),
    };
    const next = { ...usersRef.current, [newUser.id]: newUser };
    await persistUsers(next);
    setSessionUserId(newUser.id);
    saveLocalDevice("ce_session", newUser.id);
    setView("home");
    showToast("Compte créé. Bienvenue sur Comi-Étudiant !");
  }

  async function handleLogout() {
    setSessionUserId(null);
    saveLocalDevice("ce_session", null);
    setView("auth");
  }

  function handleAdminLogin() {
    setIsAdmin(true);
    saveLocalDevice("ce_is_admin", true);
    setView("admin");
  }
  function handleAdminLogout() {
    setIsAdmin(false);
    saveLocalDevice("ce_is_admin", false);
    setView("auth");
  }

  const me = sessionUserId ? users[sessionUserId] : null;

  if (loading) {
    return (
      <div style={styles.loadingScreen}>
        <div style={styles.loadingMark}>CE</div>
      </div>
    );
  }

  if (connError) {
    return (
      <Shell>
        <div style={styles.connErrorWrap}>
          <AlertTriangle size={32} color="#B5542B" />
          <div style={styles.connErrorTitle}>Connexion au serveur impossible</div>
          <div style={styles.connErrorText}>
            Vérifie la configuration Supabase (URL et clé API) dans le code, ou ta connexion internet.
          </div>
        </div>
      </Shell>
    );
  }

  if (view === "admin" && isAdmin) {
    return (
      <Shell wide>
        <AdminDashboard
          users={users}
          commissions={commissions}
          onLogout={handleAdminLogout}
        />
      </Shell>
    );
  }

  if (view === "auth" || !me) {
    return (
      <Shell>
        <AuthScreen onLogin={handleLogin} onAdminLogin={handleAdminLogin} />
      </Shell>
    );
  }

  return (
    <Shell>
      <AppHome
        me={me}
        users={users}
        commissions={commissions}
        chats={chats}
        persistChats={persistChats}
        role={role}
        setRole={setRole}
        updateUser={updateUser}
        persistCommissions={persistCommissions}
        showToast={showToast}
        onLogout={handleLogout}
      />
      {toast && <Toast toast={toast} />}
    </Shell>
  );
}

  return (

/* ============================= APP HOME (post-login) ============================= */
function AppHome({
  me, users, commissions, chats, persistChats, role, setRole,
  updateUser, persistCommissions, showToast, onLogout,
}) {
  const [screen, setScreen] = useState("feed");
  const [activeCommission, setActiveCommission] = useState(null);
  const [profileUserId, setProfileUserId] = useState(null);

  const myCommissionsAsDemandeur = commissions.filter((c) => c.demandeurId === me.id);
  const myCommissionsAsExecutant = commissions.filter((c) => c.executantId === me.id);

  function openDetail(commission) {
    setActiveCommission(commission);
    setScreen("detail");
  }
  function openProfile(userId) {
    setProfileUserId(userId);
    setScreen("profile");
  }
  async function updateFavoris(demandeurId, nextFavoris) {
    await updateUser(demandeurId, { favoris: nextFavoris });
  }

  const liveCommission = activeCommission
    ? commissions.find((c) => c.id === activeCommission.id) || activeCommission
    : null;

  return (
    <div style={styles.screenWrap}>
      <TopBar me={me} role={role} onLogout={onLogout} />
      <RoleToggle role={role} setRole={(r) => { setRole(r); setScreen("feed"); }} />

      <div style={styles.content}>
        {screen === "feed" && role === "demandeur" && (
          <DemandeurFeed
            me={me}
            users={users}
            commissions={myCommissionsAsDemandeur}
            onPublish={() => setScreen("publish")}
            onOpen={openDetail}
            onGoFavoris={() => setScreen("favoris")}
          />
        )}

        {screen === "feed" && role === "executant" && (
          <ExecutantFeed
            me={me}
            users={users}
            commissions={commissions}
            myCommissions={myCommissionsAsExecutant}
            onOpen={openDetail}
            onGoKyc={() => setScreen("kyc")}
            onOpenProfile={openProfile}
          />
        )}

        {screen === "publish" && (
          <PublishScreen
            me={me}
            onBack={() => setScreen("feed")}
            onPublished={async (commission) => {
              const next = [commission, ...commissions];
              await persistCommissions(next);
              await updateUser(me.id, { walletDemandeur: me.walletDemandeur - commission.totalDebited });
              showToast("Commission publiée et fonds bloqués en escrow.");
              setScreen("feed");
            }}
          />
        )}

        {screen === "kyc" && (
          <KycScreen
            me={me}
            onBack={() => setScreen("feed")}
            onSubmit={async (docs) => {
              await updateUser(me.id, { kyc: { status: "pending", docs } });
              showToast("Dossier KYC envoyé. Validation sous 24-48h (simulée).");
              setScreen("feed");
            }}
            onForceVerify={async () => {
              await updateUser(me.id, { kyc: { ...me.kyc, status: "verified" } });
              showToast("KYC validé (simulation démo) ✅");
            }}
          />
        )}

        {screen === "detail" && liveCommission && (
          <DetailScreen
            me={me}
            role={role}
            commission={liveCommission}
            users={users}
            chats={chats}
            onSendChat={async (commissionId, message) => {
              const thread = chats[commissionId] || [];
              const next = { ...chats, [commissionId]: [...thread, message] };
              await persistChats(next);
            }}
            onBack={() => setScreen("feed")}
            onUpdateCommission={async (patch) => {
              const next = commissions.map((c) =>
                c.id === activeCommission.id ? { ...c, ...patch } : c
              );
              await persistCommissions(next);
              setActiveCommission({ ...liveCommission, ...patch });
            }}
            updateUser={updateUser}
            updateFavoris={updateFavoris}
            showToast={showToast}
            onOpenProfile={openProfile}
          />
        )}

        {screen === "favoris" && (
          <FavorisScreen
            me={me}
            users={users}
            commissions={commissions}
            onBack={() => setScreen("feed")}
            updateUser={updateUser}
            persistCommissions={persistCommissions}
            showToast={showToast}
            onOpenProfile={openProfile}
            onOpenCommission={openDetail}
          />
        )}

        {screen === "profile" && profileUserId && users[profileUserId] && (
          <ExecutantProfileScreen
            executant={users[profileUserId]}
            me={me}
            commissions={commissions}
            onBack={() => setScreen(role === "demandeur" ? "favoris" : "feed")}
            updateUser={updateUser}
            showToast={showToast}
          />
        )}

        {screen === "history" && (
          <HistoryScreen
            me={me}
            commissions={commissions.filter(
              (c) => c.demandeurId === me.id || c.executantId === me.id
            )}
            onOpen={openDetail}
          />
        )}
      </div>

      <BottomNav
        screen={screen}
        setScreen={setScreen}
        kycStatus={me.kyc?.status}
        role={role}
      />
    </div>
  );
}

  return (
    <div style={styles.authWrap}>
      <div style={styles.authHero}>

      </div>

      <div style={styles.authCard}>
        {!showAdminForm ? (
          <>
            {step === "phone" ? (
              <>
                <label style={styles.label}>Numéro de téléphone</label>

                  style={styles.input}
                  placeholder="6XX XXX XXX"
                  value={phone}

                  onChange={(e) => setName(e.target.value)}
                  autoFocus
                />
                <button
                  style={styles.btnPrimary}
                  disabled={name.trim().length < 2}
                  onClick={() => onLogin(phone.trim(), name.trim())}
                >
                  Entrer sur Comi-Étudiant
                </button>
                <button style={styles.btnGhost} onClick={() => setStep("phone")}>
                  Retour
                </button>
              </>
            )}
            <p style={styles.authNote}>
              Démo de test avec fonds virtuels — {fmtFCFA(WALLET_DEMANDEUR_INITIAL)} côté demandeur et{" "}
              {fmtFCFA(WALLET_EXECUTANT_INITIAL)} côté exécutant sont crédités automatiquement à la création du compte.
            </p>
            <button style={styles.adminLinkBtn} onClick={() => setShowAdminForm(true)}>
              <Lock size={11} /> Accès administrateur
            </button>
          </>
        ) : (
          <>
            <label style={styles.label}>Mot de passe administrateur</label>
            <div style={styles.pwdRow}>
              <input
                style={{ ...styles.input, marginBottom: 0, flex: 1 }}
                type={showPwd ? "text" : "password"}
                value={adminPwd}
                onChange={(e) => { setAdminPwd(e.target.value); setAdminError(false); }}
                onKeyDown={(e) => { if (e.key === "Enter") submitAdmin(); }}
                autoFocus
              />
              <button style={styles.pwdEyeBtn} onClick={() => setShowPwd((s) => !s)}>
                {showPwd ? <EyeOff size={16} /> : <Eye size={16} />}
              </button>
            </div>
            {adminError && (
              <div style={styles.warningBox}>
                <AlertTriangle size={14} /> Mot de passe incorrect.
              </div>

              Entrer dans le tableau de bord

              Retour
            </button>
          </>
        )}

    </div>
  );
}



/* ============================= DEMANDEUR FEED ============================= */
function DemandeurFeed({ me, users, commissions, onPublish, onOpen, onGoFavoris }) {
  const active = commissions.filter((c) => c.status !== "validee" && c.status !== "remboursee");
  const past = commissions.filter((c) => c.status === "validee" || c.status === "remboursee");
  const favorisCount = (me.favoris || []).filter((f) => f.status === "accepted").length;

  return (
    <div style={styles.feedPad}>
      <SectionHeading title="Publier une commission" subtitle="Fais exécuter une tâche par un étudiant vérifié" />
      <button style={styles.publishCard} onClick={onPublish}>
        <div style={styles.publishCardIcon}>
          <Plus size={22} color="#F2EDE4" />
        </div>
        <div>
          <div style={styles.publishCardTitle}>Nouvelle commission</div>
          <div style={styles.publishCardSub}>Courses, colis, démarches, transport...</div>
        </div>
      </button>

      {favorisCount > 0 && (
        <button style={styles.favorisShortcut} onClick={onGoFavoris}>
          <Heart size={16} color="#B5542B" fill="#B5542B" />
          <span style={styles.favorisShortcutText}>
            {favorisCount} exécutant{favorisCount > 1 ? "s" : ""} favori{favorisCount > 1 ? "s" : ""} — envoyer une commission directe
          </span>
          <ChevronRight size={15} />
        </button>
      )}

      {active.length > 0 && (
        <>
          <SectionHeading title="En cours" subtitle={`${active.length} commission(s) active(s)`} />
          {active.map((c) => (
            <CommissionTicket key={c.id} commission={c} viewerRole="demandeur" onClick={() => onOpen(c)} />
          ))}
        </>
      )}

      {past.length > 0 && (
        <>
          <SectionHeading title="Terminées" subtitle="" />
          {past.slice(0, 3).map((c) => (
            <CommissionTicket key={c.id} commission={c} viewerRole="demandeur" onClick={() => onOpen(c)} />
          ))}
        </>
      )}

      {active.length === 0 && past.length === 0 && (
        <EmptyState
          icon={Package}
          title="Aucune commission encore"
          text="Publie ta première commission pour qu'un exécutant la prenne en charge."
        />
      )}
    </div>
  );
}

/* ============================= EXECUTANT FEED ============================= */
function ExecutantFeed({ me, users, commissions, myCommissions, onOpen, onGoKyc, onOpenProfile }) {
  const kycVerified = me.kyc?.status === "verified";
  const available = commissions.filter(
    (c) => c.status === "publiee" && c.demandeurId !== me.id && !c.directTo
  );
  const directOffers = commissions.filter(
    (c) => c.status === "publiee" && c.directTo === me.id
  );
  const mine = myCommissions.filter((c) => c.status !== "validee" && c.status !== "remboursee");
  const level = computeLevel(me.scoreExecutant?.nbCommissions || 0, me.scoreExecutant?.noteGlobale || 5);

  return (
    <div style={styles.feedPad}>
      {!kycVerified && (
        <button style={styles.kycBanner} onClick={onGoKyc}>
          <ShieldCheck size={18} />
          <div style={{ flex: 1, textAlign: "left" }}>
            <div style={styles.kycBannerTitle}>
              {me.kyc?.status === "pending" ? "KYC en attente de validation" : "Vérifie ton identité (KYC)"}
            </div>
            <div style={styles.kycBannerSub}>
              {me.kyc?.status === "pending"
                ? "Tu pourras accepter des commissions une fois validé."
                : "Obligatoire pour accepter une commission"}
            </div>
          </div>
          <ChevronRight size={16} />
        </button>
      )}

      {kycVerified && (
        <button style={styles.myLevelCard} onClick={() => onOpenProfile(me.id)}>
          <div style={{ ...styles.levelBadgeBig, background: level.color }}>
            <Award size={16} color="#F2EDE4" />
          </div>
          <div style={{ flex: 1, textAlign: "left" }}>
            <div style={styles.myLevelTitle}>Niveau {level.label}</div>
            <div style={styles.myLevelSub}>
              Note {Number(me.scoreExecutant?.noteGlobale || 5).toFixed(1)}/5 · {me.scoreExecutant?.nbCommissions || 0} commission(s)
            </div>
          </div>
          <ChevronRight size={15} />
        </button>
      )}

      {directOffers.length > 0 && (
        <>
          <SectionHeading title="Commission directe pour toi" subtitle="Un demandeur fidèle t'a choisi en priorité" />
          {directOffers.map((c) => (
            <CommissionTicket key={c.id} commission={c} viewerRole="executant" demandeur={users[c.demandeurId]} onClick={() => onOpen(c)} direct />
          ))}
        </>
      )}

      {mine.length > 0 && (
        <>
          <SectionHeading title="Mes missions en cours" subtitle={`${mine.length} en cours`} />
          {mine.map((c) => (
            <CommissionTicket key={c.id} commission={c} viewerRole="executant" onClick={() => onOpen(c)} />
          ))}
        </>
      )}

      <SectionHeading
        title="Commissions disponibles"
        subtitle={`${available.length} près de toi`}
      />
      {available.length === 0 && (
        <EmptyState
          icon={ShoppingCart}
          title="Aucune commission disponible"
          text="Reviens plus tard, ou demande à un autre testeur de publier une commission."
        />
      )}
      {available.map((c) => (
        <CommissionTicket
          key={c.id}
          commission={c}
          viewerRole="executant"
          demandeur={users[c.demandeurId]}
          onClick={() => onOpen(c)}
          locked={!kycVerified}
        />
      ))}
    </div>
  );
}

/* ============================= COMMISSION TICKET ============================= */
const CATEGORY_MAP = Object.fromEntries(CATEGORIES.map((c) => [c.id, c]));

const STATUS_LABEL = {
  publiee: { label: "Publiée", color: "#D9A53F" },
  en_cours: { label: "En cours", color: "#B5542B" },
  remise: { label: "Remise effectuée", color: "#1F4D3A" },
  validee: { label: "Validée", color: "#1F4D3A" },
  remboursee: { label: "Remboursée", color: "#8a4a3a" },
};

function CommissionTicket({ commission, viewerRole, demandeur, onClick, locked, direct }) {
  const cat = CATEGORY_MAP[commission.category];
  const Icon = cat?.icon || Package;
  const status = STATUS_LABEL[commission.status];

  return (
    <button style={styles.ticket} onClick={onClick} disabled={locked}>
      {direct && (

/* ============================= PUBLISH SCREEN ============================= */
function PublishScreen({ me, onBack, onPublished }) {
  const [category, setCategory] = useState(CATEGORIES[0].id);
  const [description, setDescription] = useState("");
  const [montantTache, setMontantTache] = useState("");
  const [montantCommission, setMontantCommission] = useState("");
  const [delai, setDelai] = useState("3h");

  const tache = parseInt(montantTache || "0", 10) || 0;
  const commission = parseInt(montantCommission || "0", 10) || 0;
  const fraisPlateforme = Math.round(commission * COMMISSION_RATE);
  const executantPayout = commission - fraisPlateforme;
  const total = tache + commission;
  const insufficientFunds = total > 0 && total > me.walletDemandeur;
  const canPublish = description.trim().length >= 5 && commission > 0 && !insufficientFunds;

  function handlePublish() {
    if (!canPublish) return;
    const c = {
      id: uid("comm"),
      demandeurId: me.id,
      executantId: null,
      category,
      description: description.trim(),
      montantTache: tache,
      montantCommission: commission,
      fraisPlateforme,
      executantPayout,
      totalDebited: total,
      delai,
      status: "publiee",
      createdAt: Date.now(),
      timeline: [{ label: "Commission publiée", ts: Date.now() }],
      proof: {},
    };
    onPublished(c);
  }

  return (
    <div style={styles.screenPad}>
      <ScreenHeader title="Nouvelle commission" onBack={onBack} />

      <Label>Catégorie de service</Label>
      <div style={styles.categoryGrid}>
        {CATEGORIES.map((c) => {
          const Icon = c.icon;
          const active = category === c.id;
          return (
            <button
              key={c.id}
              onClick={() => setCategory(c.id)}
              style={{ ...styles.categoryCard, ...(active ? styles.categoryCardActive : {}) }}
            >
              <Icon size={20} color={active ? "#F2EDE4" : "#1A1814"} />
              <span style={{ ...styles.categoryCardLabel, color: active ? "#F2EDE4" : "#1A1814" }}>
                {c.label}
              </span>
            </button>
          );
        })}
      </div>

      <Label>Description de la commission</Label>
      <textarea
        style={styles.textarea}
        placeholder="Ex : Acheter 2kg de riz et 1L d'huile au marché Mokolo, livrer à Bastos..."
        value={description}
        onChange={(e) => setDescription(e.target.value)}
        rows={3}
      />

      <Label>Montant nécessaire pour la tâche (FCFA)</Label>
      <input
        style={styles.input}
        placeholder="Ex : 8000"
        inputMode="numeric"
        value={montantTache}
        onChange={(e) => setMontantTache(e.target.value.replace(/\D/g, ""))}
      />

      <Label>Ta commission pour l'exécutant (FCFA)</Label>
      <input
        style={styles.input}
        placeholder="Ex : 1500"
        inputMode="numeric"
        value={montantCommission}
        onChange={(e) => setMontantCommission(e.target.value.replace(/\D/g, ""))}
      />
      <div style={styles.helperRow}>
        Suggestion pour cette catégorie :{" "}
        {CATEGORY_MAP[category].range[0].toLocaleString("fr-FR")}–
        {CATEGORY_MAP[category].range[1].toLocaleString("fr-FR")} FCFA
      </div>

      <Label>Délai souhaité</Label>
      <div style={styles.chipRow}>
        {["1h", "3h", "Aujourd'hui", "Flexible"].map((d) => (
          <button
            key={d}
            style={{ ...styles.chip, ...(delai === d ? styles.chipActive : {}) }}
            onClick={() => setDelai(d)}
          >
            {d}
          </button>
        ))}
      </div>

      <div style={styles.recapBox}>
        <div style={styles.recapRow}>
          <span>Montant tâche</span>
          <span>{fmtFCFA(tache)}</span>
        </div>
        <div style={styles.recapRow}>
          <span>Commission proposée</span>
          <span>{fmtFCFA(commission)}</span>
        </div>
        <div style={styles.recapRowSmall}>
          <span>— dont frais plateforme (14%)</span>
          <span>{fmtFCFA(fraisPlateforme)}</span>
        </div>
        <div style={styles.recapRowSmall}>
          <span>— versé à l'exécutant (86%)</span>
          <span>{fmtFCFA(executantPayout)}</span>
        </div>
        <div style={styles.recapDivider} />
        <div style={styles.recapRowTotal}>
          <span>Total débité (bloqué en escrow)</span>
          <span>{fmtFCFA(total)}</span>
        </div>
        <div style={styles.recapRowSmall}>
          <span>Solde actuel (portefeuille demandeur)</span>
          <span>{fmtFCFA(me.walletDemandeur)}</span>
        </div>
      </div>

      {insufficientFunds && (
        <div style={styles.warningBox}>
          <AlertTriangle size={14} /> Solde insuffisant pour ce montant.
        </div>
      )}

      <button style={styles.btnPrimary} disabled={!canPublish} onClick={handlePublish}>
        <ShieldCheck size={16} style={{ marginRight: 6, verticalAlign: -2 }} />
        Publier et bloquer les fonds
      </button>
    </div>
  );
}

/* ============================= KYC SCREEN (upload corrigé) ============================= */
function KycScreen({ me, onBack, onSubmit, onForceVerify }) {
  const [docs, setDocs] = useState(me.kyc?.docs || {});
  const [uploadError, setUploadError] = useState(null);
  const status = me.kyc?.status || "none";

  function handleFile(key, file) {
    setUploadError(null);
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      setUploadError("Le fichier doit être une image (JPG, PNG...).");
      return;
    }
    if (file.size > 8 * 1024 * 1024) {
      setUploadError("Image trop lourde (max 8 Mo). Essaie une photo plus légère.");
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => setUploadError("Impossible de lire ce fichier. Réessaie avec une autre photo.");
    reader.onload = () => {
      setDocs((d) => ({ ...d, [key]: { name: file.name, dataUrl: reader.result } }));
    };
    reader.readAsDataURL(file);
  }

  const requiredKeys = ["cni", "carteEtudiant", "selfie"];
  const complete = requiredKeys.every((k) => docs[k]);

  if (status === "verified") {
    return (
      <div style={styles.screenPad}>
        <ScreenHeader title="Vérification d'identité" onBack={onBack} />
        <div style={styles.kycVerifiedBox}>
          <ShieldCheck size={32} color="#1F4D3A" />
          <div style={styles.kycVerifiedTitle}>Identité vérifiée</div>
          <div style={styles.kycVerifiedSub}>
            Tu peux désormais accepter des commissions sur Comi-Étudiant.
          </div>
        </div>
        <DocPreviewGrid docs={docs} />
      </div>
    );
  }

  return (
    <div style={styles.screenPad}>
      <ScreenHeader title="Vérification d'identité (KYC)" onBack={onBack} />
      <p style={styles.kycIntro}>
        Pour la sécurité de tous, chaque exécutant doit fournir ces trois documents.
        Ils sont stockés uniquement pour cette démo.
      </p>

      {status === "pending" && (
        <div style={styles.kycPendingBox}>
          <Clock size={16} color="#D9A53F" />
          <span>Dossier envoyé. Validation simulée sous 24-48h.</span>
        </div>
      )}

      {uploadError && (
        <div style={styles.warningBox}>
          <AlertTriangle size={14} /> {uploadError}
        </div>
      )}

      <UploadRow
        id="upload-cni"
        label="Carte Nationale d'Identité (CNI)"
        icon={FileText}
        doc={docs.cni}
        onFile={(f) => handleFile("cni", f)}
      />
      <UploadRow
        id="upload-carte-etudiant"
        label="Carte d'étudiant"
        icon={FileText}
        doc={docs.carteEtudiant}
        onFile={(f) => handleFile("carteEtudiant", f)}
      />
      <UploadRow
        id="upload-selfie"
        label="Selfie de vérification"
        icon={Camera}
        doc={docs.selfie}
        onFile={(f) => handleFile("selfie", f)}
      />

      <button
        style={styles.btnPrimary}
        disabled={!complete}
        onClick={() => onSubmit(docs)}
      >
        Envoyer mon dossier KYC
      </button>

      {status === "pending" && (
        <button style={styles.btnGhost} onClick={onForceVerify}>
          <RefreshCw size={13} style={{ marginRight: 5, verticalAlign: -2 }} />
          Simuler la validation admin (démo)
        </button>
      )}
    </div>
  );
}

function UploadRow({ id, label, icon: Icon, doc, onFile }) {
  return (
    <div style={styles.uploadRow}>
      <div style={styles.uploadRowLeft}>
        {doc ? (
          <img src={doc.dataUrl} alt={label} style={styles.uploadThumb} />
        ) : (
          <div style={styles.uploadThumbPlaceholder}>
            <Icon size={18} color="#8a8276" />
          </div>
        )}
        <div>
          <div style={styles.uploadLabel}>{label}</div>
          <div style={styles.uploadStatus}>{doc ? "Fichier ajouté ✓" : "Aucun fichier"}</div>
        </div>
      </div>
      <input
        id={id}
        type="file"
        accept="image/*"
        style={{ display: "none" }}

function DocPreviewGrid({ docs }) {
  const entries = Object.entries(docs);
  if (!entries.length) return null;
  return (
    <div style={styles.docPreviewGrid}>
      {entries.map(([k, v]) => (
        <img key={k} src={v.dataUrl} alt={k} style={styles.docPreviewImg} />
      ))}

  );
}

/* ============================= DETAIL SCREEN ============================= */
function DetailScreen({ me, role, commission, users, chats, onSendChat, onBack, onUpdateCommission, updateUser, updateFavoris, showToast, onOpenProfile }) {
  const isDemandeur = commission.demandeurId === me.id;
  const isExecutant = commission.executantId === me.id;
  const cat = CATEGORY_MAP[commission.category];
  const demandeur = users[commission.demandeurId];
  const executant = commission.executantId ? users[commission.executantId] : null;

  const [showVideoCapture, setShowVideoCapture] = useState(false);
  const [showSignature, setShowSignature] = useState(false);
  const [showChat, setShowChat] = useState(false);
  const [showCall, setShowCall] = useState(null);
  const [showRating, setShowRating] = useState(false);

  const chatActive = commission.status === "en_cours" || commission.status === "remise";
  const thread = chats?.[commission.id] || [];
  const unreadCount = thread.filter((m) => m.authorId !== me.id && !(m.readBy || []).includes(me.id)).length;

  const isFavoriteAccepted = (demandeur?.favoris || []).some(
    (f) => f.executantId === executant?.id && f.status === "accepted"
  );
  const isFavoritePending = (demandeur?.favoris || []).some(
    (f) => f.executantId === executant?.id && f.status === "pending"
  );

  async function handleAccept() {
    if (me.kyc?.status !== "verified") {
      showToast("KYC requis avant d'accepter une commission.", "error");
      return;
    }
    await onUpdateCommission({
      executantId: me.id,
      status: "en_cours",
      timeline: [
        ...commission.timeline,
        { label: `Prise en charge par ${me.name.split(" ")[0]}`, ts: Date.now() },
      ],
    });
    showToast("Commission acceptée. Les fonds restent bloqués en escrow.");
  }

  async function handleDeclineDirect() {
    await onUpdateCommission({ directTo: null, directDeclinedBy: [...(commission.directDeclinedBy || []), me.id] });
    showToast("Commission directe déclinée — ouverte à tous les exécutants.");
  }

  async function handleProofVideo(dataUrl) {
    await onUpdateCommission({
      proof: { ...commission.proof, videoDataUrl: dataUrl, videoAt: Date.now() },
    });
    setShowVideoCapture(false);
    showToast("Vidéo de remise enregistrée.");
  }

  async function handleSignature(dataUrl) {
    await onUpdateCommission({
      proof: { ...commission.proof, signatureDataUrl: dataUrl, signedAt: Date.now() },
      status: "remise",
      timeline: [
        ...commission.timeline,
        { label: "Remise filmée + signature électronique", ts: Date.now() },
      ],
    });
    setShowSignature(false);
    showToast("Remise confirmée. En attente de validation du demandeur.");
  }

  async function handleValidate() {
    setShowRating(true);
  }

  async function handleSubmitRating(criteres, commentaire) {
    const exec = users[commission.executantId];
    const noteCommission =
      criteres.qualite * 0.35 + criteres.ponctualite * 0.25 +
      criteres.communication * 0.20 + criteres.attitude * 0.15 + criteres.presentation * 0.05;

    const prevScore = exec.scoreExecutant || { noteGlobale: 5, nbCommissions: 0, notesRecues: [] };
    const nbCommissions = prevScore.nbCommissions + 1;
    const noteGlobale = (prevScore.noteGlobale * prevScore.nbCommissions + noteCommission) / nbCommissions;
    const details = {};
    RATING_CRITERIA.forEach((c) => {
      const prevDetail = prevScore.details?.[c.id] ?? 5;
      details[c.id] = (prevDetail * prevScore.nbCommissions + criteres[c.id]) / nbCommissions;
    });

    // Paiement : 86% commission + remboursement intégral des frais de tâche avancés, crédités au portefeuille EXÉCUTANT
    await updateUser(commission.executantId, {
      walletExecutant: exec.walletExecutant + commission.executantPayout + commission.montantTache,
      scoreExecutant: {
        noteGlobale,
        nbCommissions,
        tauxCompletion: 100,
        details,
        notesRecues: [
          ...(prevScore.notesRecues || []),
          { commissionId: commission.id, criteres, commentaire, auteur: me.name, ts: Date.now() },
        ],
      },
    });

    const dem = users[commission.demandeurId];
    await updateUser(commission.demandeurId, {
      ratingDemandeur: bumpRating(dem.ratingDemandeur),
    });

    await onUpdateCommission({
      status: "validee",
      noteSoumise: { criteres, commentaire, noteCommission },
      timeline: [
        ...commission.timeline,
        {
          label: `Validée — ${fmtFCFA(commission.executantPayout)} (86%) + remboursement frais versés`,
          ts: Date.now(),
        },
        { label: `Notée ${noteCommission.toFixed(1)}/5 par ${me.name.split(" ")[0]}`, ts: Date.now() },
      ],
    });
    setShowRating(false);
    showToast("Paiement libéré et note enregistrée ✅");
  }

  async function handleRefund() {
    // Remboursement intégral sur le portefeuille DEMANDEUR (c'est de là que les fonds ont été débités)
    await updateUser(commission.demandeurId, {
      walletDemandeur: me.walletDemandeur + commission.totalDebited,
    });
    await onUpdateCommission({
      status: "remboursee",
      timeline: [...commission.timeline, { label: "Commission annulée — remboursement intégral", ts: Date.now() }],
    });
    showToast("Remboursement effectué.");
  }

  async function handleToggleFavorite() {
    if (!executant) return;
    const current = demandeur.favoris || [];
    if (isFavoriteAccepted || isFavoritePending) {
      const next = current.filter((f) => f.executantId !== executant.id);
      await updateFavoris(demandeur.id, next);
      showToast("Retiré de tes favoris.");
      return;
    }
    if (current.length >= MAX_FAVORIS) {
      showToast(`Maximum ${MAX_FAVORIS} favoris atteint.`, "error");
      return;
    }
    const next = [...current, { executantId: executant.id, status: "accepted", since: Date.now(), nbCommEnsemble: 1 }];
    await updateFavoris(demandeur.id, next);
    showToast(`${executant.name.split(" ")[0]} ajouté à tes favoris !`);
  }

  return (
    <div style={styles.screenPad}>
      <ScreenHeader title={cat?.label || "Commission"} onBack={onBack} />

      {commission.directTo === me.id && commission.status === "publiee" && (
        <div style={styles.directBanner}>
          <Heart size={15} fill="#B5542B" color="#B5542B" />
          <span>Commission directe d'un client fidèle — réponds avant l'ouverture publique.</span>
        </div>
      )}

      <div style={styles.detailHeaderCard}>
        <div style={styles.detailDesc}>{commission.description}</div>
        <div style={styles.detailMetaRow}>
          <span style={{ ...styles.statusChip, background: STATUS_LABEL[commission.status]?.color }}>
            {STATUS_LABEL[commission.status]?.label}
          </span>
          <span style={styles.ticketMeta}>
            <Clock size={12} /> {commission.delai}
          </span>
        </div>
      </div>

      <div style={styles.amountsGrid}>
        <AmountBox label="Montant tâche" value={fmtFCFA(commission.montantTache)} />
        <AmountBox label="Commission" value={fmtFCFA(commission.montantCommission)} />
        <AmountBox label="Part exécutant (86%)" value={fmtFCFA(commission.executantPayout)} highlight="green" />
        <AmountBox label="Part plateforme (14%)" value={fmtFCFA(commission.fraisPlateforme)} highlight="ocre" />
      </div>

      <PeopleRow
        demandeur={demandeur}
        executant={executant}
        onOpenExecutant={executant ? () => onOpenProfile(executant.id) : null}
      />

      {isDemandeur && executant && commission.status !== "publiee" && (
        <button style={styles.favoriteToggle} onClick={handleToggleFavorite}>
          <Heart size={15} fill={isFavoriteAccepted ? "#B5542B" : "none"} color="#B5542B" />
          {isFavoriteAccepted ? "Retirer des favoris" : isFavoritePending ? "Favori en attente d'acceptation" : "Ajouter aux favoris"}
        </button>
      )}

      {chatActive && (
        <button style={styles.chatEntryBtn} onClick={() => setShowChat(true)}>
          <div style={{ position: "relative" }}>
            <MessageCircle size={18} color="#1F4D3A" />
            {unreadCount > 0 && <span style={styles.chatUnreadDot} />}
          </div>
          <span style={styles.chatEntryText}>
            {thread.length > 0 ? `Discussion (${thread.length} message${thread.length > 1 ? "s" : ""})` : "Ouvrir la discussion"}
          </span>
          <div style={styles.chatEntryCallBtns}>
            <span
              style={styles.chatEntryCallIcon}
              onClick={(e) => { e.stopPropagation(); setShowCall("audio"); }}
            >
              <Phone size={14} />
            </span>
            <span
              style={styles.chatEntryCallIcon}
              onClick={(e) => { e.stopPropagation(); setShowCall("video"); }}
            >
              <Video size={14} />
            </span>
          </div>
        </button>
      )}

      <Timeline events={commission.timeline} />

      {commission.proof?.videoDataUrl && (
        <ProofBlock label="Vidéo de remise" type="video" src={commission.proof.videoDataUrl} ts={commission.proof.videoAt} />
      )}
      {commission.proof?.signatureDataUrl && (
        <ProofBlock label="Signature électronique" type="image" src={commission.proof.signatureDataUrl} ts={commission.proof.signedAt} />
      )}
      {commission.noteSoumise && (
        <RatingSummaryBlock note={commission.noteSoumise} />
      )}

      <div style={styles.actionsZone}>
        {role === "executant" && commission.status === "publiee" && !isDemandeur && (!commission.directTo || commission.directTo === me.id) && (
          <button style={styles.btnPrimary} onClick={handleAccept}>
            {commission.directTo === me.id ? "Accepter cette commission directe" : "Accepter cette commission"}
          </button>
        )}

        {role === "executant" && commission.directTo === me.id && commission.status === "publiee" && (
          <button style={styles.btnGhost} onClick={handleDeclineDirect}>
            Décliner — ouvrir à tous
          </button>
        )}

        {isExecutant && commission.status === "en_cours" && (
          <button style={styles.btnPrimary} onClick={() => setShowVideoCapture(true)}>
            <Video size={16} style={{ marginRight: 6, verticalAlign: -2 }} />
            Filmer la remise
          </button>
        )}

        {isExecutant && commission.status === "en_cours" && commission.proof?.videoDataUrl && !commission.proof?.signatureDataUrl && (
          <button style={styles.btnPrimary} onClick={() => setShowSignature(true)}>
            <PenTool size={16} style={{ marginRight: 6, verticalAlign: -2 }} />
            Faire signer le demandeur
          </button>
        )}

        {isDemandeur && commission.status === "remise" && (
          <button style={styles.btnPrimary} onClick={handleValidate}>
            <CheckCircle2 size={16} style={{ marginRight: 6, verticalAlign: -2 }} />
            Valider la réception et noter
          </button>
        )}

        {isDemandeur && (commission.status === "publiee" || commission.status === "en_cours") && (
          <button style={styles.btnDanger} onClick={handleRefund}>
            Annuler et me rembourser
          </button>
        )}
      </div>

      {showVideoCapture && (
        <VideoCaptureModal onClose={() => setShowVideoCapture(false)} onCapture={handleProofVideo} />
      )}
      {showSignature && (
        <SignatureModal onClose={() => setShowSignature(false)} onSign={handleSignature} />
      )}
      {showChat && (
        <ChatModal
          me={me}
          thread={thread}
          onClose={() => setShowChat(false)}
          onSend={(message) => onSendChat(commission.id, message)}
          onStartCall={(type) => { setShowChat(false); setShowCall(type); }}
        />
      )}
      {showCall && (
        <CallModal
          type={showCall}
          counterpart={isDemandeur ? executant : demandeur}
          onClose={() => setShowCall(null)}
        />
      )}
      {showRating && (
        <RatingModal onClose={() => setShowRating(false)} onSubmit={handleSubmitRating} executantName={executant?.name} />
      )}
    </div>
  );
}

function bumpRating(r) {
  const count = (r?.count || 0) + 1;
  const avg = ((r?.avg || 5) * (r?.count || 0) + 5) / count;
  return { avg, count };
}

      }}
    >
      <div style={styles.amountBoxLabel}>{label}</div>
      <div style={styles.amountBoxValue}>{value}</div>
    </div>
  );
}

function PeopleRow({ demandeur, executant, onOpenExecutant }) {
  return (

function CallModal({ type, counterpart, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [seconds, setSeconds] = useState(0);
  const [muted, setMuted] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: type === "video",
          audio: true,
        });
        streamRef.current = stream;
        if (videoRef.current && type === "video") {
          videoRef.current.srcObject = stream;
          await videoRef.current.play().catch(() => {});
        }
      } catch (e) {
        setError("Micro/caméra non disponibles ou refusés. L'appel reste simulé.");
      }
    })();
    const interval = setInterval(() => setSeconds((s) => s + 1), 1000);
    return () => {
      clearInterval(interval);
      streamRef.current?.getTracks().forEach((t) => t.stop());
    };
  }, [type]);

  function toggleMute() {
    setMuted((m) => {
      streamRef.current?.getAudioTracks().forEach((t) => (t.enabled = m));
      return !m;
    });
  }

  const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
  const ss = String(seconds % 60).padStart(2, "0");

  return (
    <div style={styles.modalOverlay}>
      <div style={styles.callModalBox}>
        {type === "video" && !error ? (
          <video ref={videoRef} muted playsInline style={styles.callVideoSelf} />
        ) : (
          <div style={styles.callAvatarBig}>{counterpart ? counterpart.name[0] : "?"}</div>
        )}
        <div style={styles.callName}>{counterpart ? counterpart.name : "Correspondant"}</div>
        <div style={styles.callTimer}>{mm}:{ss}</div>
        {error && <div style={styles.callErrorNote}>{error}</div>}
        <div style={styles.callControls}>
          <button style={styles.callControlBtn} onClick={toggleMute}>
            <Mic size={18} color={muted ? "#B5542B" : "#1A1814"} />
          </button>
          <button style={styles.callEndBtn} onClick={onClose}>
            <PhoneOff size={20} color="#fff" />
          </button>
        </div>
        <p style={styles.modalNote}>
          Appel {type === "video" ? "vidéo" : "audio"} relayé via les serveurs Comi-Étudiant — numéros jamais partagés.
        </p>
      </div>
    </div>
  );
}

/* ============================= VIDEO CAPTURE MODAL (webcam réelle) ============================= */
function VideoCaptureModal({ onClose, onCapture }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const recorderRef = useRef(null);
  const chunksRef = useRef([]);
  const [recording, setRecording] = useState(false);
  const [recordedUrl, setRecordedUrl] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play().catch(() => {});
        }
      } catch (e) {
        setError("Caméra non disponible ou accès refusé. Tu peux fermer et continuer en démo.");
      }
    })();
    return () => {
      streamRef.current?.getTracks().forEach((t) => t.stop());
    };
  }, []);

  function startRecording() {
    if (!streamRef.current) return;
    chunksRef.current = [];
    const recorder = new MediaRecorder(streamRef.current);
    recorder.ondataavailable = (e) => chunksRef.current.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunksRef.current, { type: "video/webm" });
      const reader = new FileReader();
      reader.onload = () => setRecordedUrl(reader.result);
      reader.readAsDataURL(blob);
    };
    recorder.start();
    recorderRef.current = recorder;
    setRecording(true);
    setTimeout(() => {
      if (recorderRef.current?.state === "recording") recorderRef.current.stop();
      setRecording(false);
    }, 8000);
  }

  function stopRecording() {
    recorderRef.current?.stop();
    setRecording(false);
  }

  return (
    <ModalShell onClose={onClose} title="Vidéo de remise">
      {error ? (
        <div style={styles.warningBox}>{error}</div>
      ) : (
        <>
          {!recordedUrl ? (
            <video ref={videoRef} muted playsInline style={styles.captureVideo} />
          ) : (
            <video src={recordedUrl} controls style={styles.captureVideo} />
          )}
          <div style={styles.captureControls}>
            {!recordedUrl && !recording && (
              <button style={styles.btnPrimary} onClick={startRecording}>
                <Video size={15} style={{ marginRight: 6, verticalAlign: -2 }} /> Démarrer (8s max)
              </button>
            )}
            {recording && (
              <button style={styles.btnDanger} onClick={stopRecording}>
                <Square size={14} style={{ marginRight: 6, verticalAlign: -2 }} /> Arrêter
              </button>
            )}
            {recordedUrl && (
              <>
                <button style={styles.btnPrimary} onClick={() => onCapture(recordedUrl)}>
                  <Check size={15} style={{ marginRight: 6, verticalAlign: -2 }} /> Utiliser cette vidéo
                </button>
                <button style={styles.btnGhost} onClick={() => setRecordedUrl(null)}>
                  Refaire
                </button>
              </>
            )}
          </div>
        </>
      )}
      <p style={styles.modalNote}>Géolocalisation et horodatage seraient attachés automatiquement en production.</p>
    </ModalShell>
  );
}

/* ============================= SIGNATURE MODAL (canvas réel) ============================= */
function SignatureModal({ onClose, onSign }) {
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);
  const [hasDrawn, setHasDrawn] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#1A1814";
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
  }, []);

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function start(e) {
    drawingRef.current = true;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const { x, y } = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(x, y);
    setHasDrawn(true);
  }
  function move(e) {
    if (!drawingRef.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const { x, y } = getPos(e, canvas);
    ctx.lineTo(x, y);
    ctx.stroke();
  }
  function end() {
    drawingRef.current = false;
  }
  function clear() {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setHasDrawn(false);
  }

  return (
    <ModalShell onClose={onClose} title="Signature électronique du demandeur">
      <p style={styles.modalNote}>Le demandeur signe ici pour confirmer la bonne réception.</p>
      <canvas
        ref={canvasRef}
        width={300}
        height={160}
        style={styles.signatureCanvas}
        onMouseDown={start}
        onMouseMove={move}
        onMouseUp={end}
        onMouseLeave={end}
        onTouchStart={start}
        onTouchMove={move}
        onTouchEnd={end}
      />
      <div style={styles.captureControls}>
        <button
          style={styles.btnPrimary}
          disabled={!hasDrawn}
          onClick={() => onSign(canvasRef.current.toDataURL())}
        >
          <Check size={15} style={{ marginRight: 6, verticalAlign: -2 }} /> Confirmer la signature
        </button>
        <button style={styles.btnGhost} onClick={clear}>
          Effacer
        </button>
      </div>
    </ModalShell>
  );
}

function FavorisScreen({ me, users, commissions, onBack, updateUser, persistCommissions, showToast, onOpenProfile, onOpenCommission }) {
  const favoris = me.favoris || [];
  const accepted = favoris.filter((f) => f.status === "accepted");
  const pending = favoris.filter((f) => f.status === "pending");
  const [composeFor, setComposeFor] = useState(null);

  async function sendDirectCommission(executantId, payload) {
    const c = {
      id: uid("comm"),
      demandeurId: me.id,
      executantId: null,
      directTo: executantId,
      directSentAt: Date.now(),
      category: payload.category,
      description: payload.description,
      montantTache: payload.montantTache,
      montantCommission: payload.montantCommission,
      fraisPlateforme: Math.round(payload.montantCommission * COMMISSION_RATE),
      executantPayout: payload.montantCommission - Math.round(payload.montantCommission * COMMISSION_RATE),
      totalDebited: payload.montantTache + payload.montantCommission,
      delai: payload.delai,
      status: "publiee",
      createdAt: Date.now(),
      timeline: [{ label: "Commission directe envoyée à un favori", ts: Date.now() }],
      proof: {},
    };
    if (c.totalDebited > me.walletDemandeur) {
      showToast("Solde insuffisant pour cette commission.", "error");
      return;
    }
    const next = [c, ...commissions];
    await persistCommissions(next);
    await updateUser(me.id, { walletDemandeur: me.walletDemandeur - c.totalDebited });
    showToast(`Commission directe envoyée. Priorité 10 min avant ouverture publique.`);
  }

  async function removeFavorite(executantId) {
    const next = favoris.filter((f) => f.executantId !== executantId);
    await updateUser(me.id, { favoris: next });
    showToast("Favori retiré.");
  }

  return (
    <div style={styles.feedPad}>
      <SectionHeading title="Mes exécutants favoris" subtitle={`${accepted.length} de confiance · ${pending.length} en attente`} />

      {accepted.length === 0 && pending.length === 0 && (
        <EmptyState
          icon={Heart}
          title="Aucun favori encore"
          text="Après une commission réussie, tu peux ajouter l'exécutant à tes favoris depuis le détail de la commission."
        />
      )}

      {accepted.map((f) => {
        const exec = users[f.executantId];
        if (!exec) return null;
        const level = computeLevel(exec.scoreExecutant?.nbCommissions || 0, exec.scoreExecutant?.noteGlobale || 5);
        return (
          <div key={f.executantId} style={styles.favoriCard}>
            <button style={styles.favoriCardHeader} onClick={() => onOpenProfile(exec.id)}>
              <div style={styles.personAvatar}>{exec.name[0]}</div>
              <div style={{ flex: 1, textAlign: "left" }}>
                <div style={styles.favoriCardName}>{exec.name}</div>
                <div style={styles.favoriCardMeta}>
                  <Star size={11} fill="#D9A53F" color="#D9A53F" /> {Number(exec.scoreExecutant?.noteGlobale || 5).toFixed(1)}
                  {" · "}
                  <span style={{ color: level.color, fontWeight: 700 }}>{level.label}</span>
                </div>
              </div>
              <ChevronRight size={16} color="#8a8276" />
            </button>
            <div style={styles.favoriCardFooter}>
              <button style={styles.favoriSendBtn} onClick={() => setComposeFor(exec)}>
                Envoyer une commission
              </button>
              <button style={styles.favoriRemoveBtn} onClick={() => removeFavorite(exec.id)}>
                <X size={14} />
              </button>
            </div>
          </div>
        );
      })}

      {pending.length > 0 && (
        <>
          <SectionHeading title="En attente d'acceptation" subtitle="" />
          {pending.map((f) => {
            const exec = users[f.executantId];
            if (!exec) return null;
            return (
              <div key={f.executantId} style={styles.favoriCard}>
                <div style={styles.favoriCardHeader}>
                  <div style={styles.personAvatar}>{exec.name[0]}</div>
                  <div style={{ flex: 1 }}>
                    <div style={styles.favoriCardName}>{exec.name}</div>
                    <div style={styles.favoriCardMeta}>En attente de réponse</div>
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {composeFor && (
        <DirectCommissionModal
          executant={composeFor}
          onClose={() => setComposeFor(null)}
          onSend={(payload) => { sendDirectCommission(composeFor.id, payload); setComposeFor(null); }}
        />
      )}
    </div>
  );
}

          onClick={() => onSend({ category, description: description.trim(), montantTache: tache, montantCommission: commission, delai: "Flexible" })}
        >
          Envoyer la commission directe
        </button>
      </div>
    </div>
  );
}

/* ============================= PROFIL PUBLIC EXÉCUTANT ============================= */
function ExecutantProfileScreen({ executant, me, commissions, onBack, updateUser, showToast }) {
  const score = executant.scoreExecutant || { noteGlobale: 5, nbCommissions: 0, details: {}, notesRecues: [] };
  const level = computeLevel(score.nbCommissions, score.noteGlobale);
  const isMe = executant.id === me.id;
  const completed = commissions.filter((c) => c.executantId === executant.id && c.status === "validee");
  const specialites = {};
  completed.forEach((c) => { specialites[c.category] = (specialites[c.category] || 0) + 1; });

  const isFavoriteAccepted = !isMe && (me.favoris || []).some((f) => f.executantId === executant.id && f.status === "accepted");

  async function toggleFavorite() {
    const current = me.favoris || [];
    if (isFavoriteAccepted) {
      await updateUser(me.id, { favoris: current.filter((f) => f.executantId !== executant.id) });
      showToast("Retiré de tes favoris.");
    } else {
      if (current.length >= MAX_FAVORIS) {
        showToast(`Maximum ${MAX_FAVORIS} favoris atteint.`, "error");
        return;
      }
      await updateUser(me.id, { favoris: [...current, { executantId: executant.id, status: "accepted", since: Date.now() }] });
      showToast(`${executant.name.split(" ")[0]} ajouté à tes favoris !`);
    }
  }

  return (
    <div style={styles.screenPad}>
      <ScreenHeader title="Profil exécutant" onBack={onBack} />

      <div style={styles.profileHero}>
        <div style={styles.profileAvatarBig}>{executant.name[0]}</div>
        <div style={styles.profileName}>{executant.name}</div>
        <div style={{ ...styles.profileLevelBadge, background: level.color }}>
          <Award size={13} /> NIVEAU {level.label.toUpperCase()}
        </div>
        {executant.kyc?.status === "verified" && (
          <div style={styles.profileVerified}>
            <ShieldCheck size={13} /> Identité vérifiée (KYC)
          </div>
        )}
      </div>

      <div style={styles.profileNoteHero}>
        <div style={styles.profileNoteValue}>{Number(score.noteGlobale).toFixed(1)} / 5</div>
        <div style={styles.profileNoteSub}>{score.nbCommissions} commission(s) réalisée(s)</div>
        <div style={styles.profileProgressBar}>
          <div style={{ ...styles.profileProgressFill, width: `${Math.min(100, (score.noteGlobale / 5) * 100)}%` }} />
        </div>
      </div>

      <SectionHeading title="Détail des notes" subtitle="" />
      <div style={styles.detailNotesBox}>
        {RATING_CRITERIA.map((c) => (
          <div key={c.id} style={styles.detailNoteRow}>
            <span style={styles.detailNoteLabel}>{c.label}</span>
            <div style={styles.detailNoteStars}>
              {[1, 2, 3, 4, 5].map((n) => (
                <Star key={n} size={13} fill={n <= Math.round(score.details?.[c.id] || 5) ? "#D9A53F" : "none"} color="#D9A53F" />
              ))}
            </div>
            <span style={styles.detailNoteValue}>{Number(score.details?.[c.id] || 5).toFixed(1)}</span>
          </div>
        ))}
      </div>

      {Object.keys(specialites).length > 0 && (
        <>
          <SectionHeading title="Spécialités" subtitle="" />
          <div style={styles.specialiteRow}>
            {Object.entries(specialites).map(([catId, count]) => (
              <span key={catId} style={styles.specialiteChip}>
                {CATEGORY_MAP[catId]?.label || catId} ({count})
              </span>
            ))}
          </div>
        </>
      )}

      {score.notesRecues?.length > 0 && (
        <>
          <SectionHeading title="Derniers avis" subtitle="" />
          {score.notesRecues.slice(-3).reverse().map((n, i) => (
            <div key={i} style={styles.avisCard}>
              <div style={styles.avisStars}>
                {[1, 2, 3, 4, 5].map((s) => (
                  <Star key={s} size={12} fill={s <= Math.round(n.criteres.qualite) ? "#D9A53F" : "none"} color="#D9A53F" />
                ))}
                <span style={styles.avisAuthor}>— {n.auteur?.split(" ")[0]}</span>
              </div>
              {n.commentaire && <div style={styles.avisText}>{n.commentaire}</div>}
            </div>
          ))}
        </>
      )}

      {!isMe && (
        <button style={{ ...styles.btnPrimary, marginTop: 18 }} onClick={toggleFavorite}>
          <Heart size={15} style={{ marginRight: 6, verticalAlign: -2 }} fill={isFavoriteAccepted ? "#F2EDE4" : "none"} />
          {isFavoriteAccepted ? "Retirer des favoris" : "Ajouter aux favoris"}
        </button>
      )}
    </div>
  );
}

/* ============================= HISTORY ============================= */
function HistoryScreen({ me, commissions, onOpen }) {
  const sorted = [...commissions].sort((a, b) => b.createdAt - a.createdAt);
  return (
    <div style={styles.feedPad}>
      <SectionHeading title="Historique des transactions" subtitle={`${sorted.length} commission(s)`} />
      {sorted.length === 0 && (
        <EmptyState icon={History} title="Rien pour l'instant" text="Tes commissions apparaîtront ici." />
      )}
      {sorted.map((c) => (
        <CommissionTicket
          key={c.id}
          commission={c}
          viewerRole={c.demandeurId === me.id ? "demandeur" : "executant"}
          onClick={() => onOpen(c)}
        />
      ))}
    </div>
  );
}

  adminTdMono: { padding: "11px 16px", borderBottom: "1px solid #EFE8D9", color: "#1A1814", fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap" },
  adminTdMuted: { padding: "11px 16px", borderBottom: "1px solid #EFE8D9", color: "#8a8276", textAlign: "center" },
  adminKycBadge: {
    display: "inline-block", fontSize: 10, fontWeight: 700, color: "#fff",
    padding: "4px 9px", borderRadius: 20, whiteSpace: "nowrap",
  },
};

/* ============================= MOUNT ============================= */
try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  document.getElementById("boot-loader").remove();
} catch (mountError) {
  console.error("Erreur au montage de l'application:", mountError);
  window.ceShowFatalError(
    "L'application s'est chargée mais a planté en démarrant.",
    String(mountError && mountError.message ? mountError.message : mountError) +
      (mountError && mountError.stack ? "\n\n" + mountError.stack.split("\n").slice(0, 4).join("\n") : "")
  );
}
</script>
